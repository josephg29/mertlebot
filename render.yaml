services:
  - type: web
    name: mertlebot
    runtime: node
    plan: starter
    buildCommand: npm ci && npm run build
    startCommand: node build/index.js
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: DATA_DIR
        value: /var/data
    disk:
      name: mertle-data
      mountPath: /var/data
      sizeGB: 1
