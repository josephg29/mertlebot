services:
  app:
    build: .
    ports:
      - "${PORT:-3000}:3000"
    volumes:
      - app-data:/data
    environment:
      NODE_ENV: production
      DATA_DIR: /data
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY:-}"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "-O-", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

volumes:
  app-data:
    driver: local
