services:
  - type: web
    name: mertlebot
    runtime: node
    plan: free
    buildCommand: npm ci && npm run build
    startCommand: node build/index.js
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: ANTHROPIC_API_KEY
        sync: false
